name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.repository }}-ci-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build and smoke-check
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0, Node 24

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0, Node 24
        with:
          python-version: "3.12"

      - name: Syntax check
        run: python -m compileall app

      - name: Build container images
        run: docker compose build
        env:
          ATLAS_SECRET: ${{ vars.ATLAS_SECRET_CI_PLACEHOLDER }}

      - name: Report to Discord
        if: ${{ always() && github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        env:
          WEBHOOK: ${{ secrets.DISCORD_CICD_WEBHOOK }}
          JOB_STATUS: ${{ job.status }}
          ACTOR: ${{ github.actor }}
        run: |
          set -euo pipefail
          SHORT_SHA="${GITHUB_SHA:0:7}"
          RUN_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          if [ "$JOB_STATUS" = "success" ]; then
            TITLE="CI passed: ollama-rag-kit"; COLOR=4906624; STATUS="🟢 passed"
          else
            TITLE="CI failed: ollama-rag-kit"; COLOR=14830410; STATUS="🔴 failed"
          fi
          PAYLOAD=$(jq -n \
            --arg title "$TITLE" --argjson color "$COLOR" --arg status "$STATUS" \
            --arg sha "$SHORT_SHA" --arg run_url "$RUN_URL" --arg actor "$ACTOR" \
            '{
              username: "ci-cd",
              embeds: [{
                title: $title,
                color: $color,
                fields: [
                  {name: "Status", value: $status, inline: true},
                  {name: "Commit", value: $sha, inline: true},
                  {name: "Actor", value: $actor, inline: true},
                  {name: "Run", value: ("[logs](" + $run_url + ")"), inline: false}
                ],
                footer: {text: "Atlas Systems — Pipeline"}
              }]
            }')
          curl -fsS -X POST "$WEBHOOK" -H "Content-Type: application/json" -d "$PAYLOAD"
