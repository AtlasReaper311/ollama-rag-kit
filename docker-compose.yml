# ollama-rag-kit
#
# One command to a working RAG stack:  docker compose up --build
#
# Two services: a pinned Chroma vector store and the FastAPI app built
# from this repo. Ollama stays on the host (it owns the GPU); containers
# reach it through host.docker.internal, which extra_hosts maps on native
# Linux so the same file works on Docker Desktop and WSL2 without edits.

name: ollama-rag-kit

services:
  chromadb:
    # Server image pinned to match the chromadb client pin in
    # requirements.txt. Bump both together; the wire protocol is not
    # guaranteed across minor versions.
    image: chromadb/chroma:0.5.23
    restart: unless-stopped
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    volumes:
      - chroma-data:/chroma/chroma
    # No container healthcheck: the image ships without curl or wget, and
    # the rag-api owns its own readiness with a retry loop, which works
    # the same under compose, plain docker run, or any orchestrator.

  rag-api:
    build: .
    restart: unless-stopped
    depends_on:
      - chromadb
    ports:
      - "8000:8000"
    environment:
      # ${VAR:-default} reads .env if present and falls back to the same
      # defaults baked into app/config.py, so the stack boots with no
      # .env file at all.
      - OLLAMA_HOST=${OLLAMA_HOST:-http://host.docker.internal:11434}
      - EMBED_MODEL=${EMBED_MODEL:-nomic-embed-text}
      - LLM_MODEL=${LLM_MODEL:-llama3.1:8b}
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - COLLECTION_NAME=${COLLECTION_NAME:-atlas_docs}
      - CHUNK_SIZE=${CHUNK_SIZE:-1200}
      - CHUNK_OVERLAP=${CHUNK_OVERLAP:-200}
      - TOP_K=${TOP_K:-4}
      - NUM_CTX=${NUM_CTX:-8192}
      - TEMPERATURE=${TEMPERATURE:-0.2}
      - MEMORY_COLLECTION_NAME=${MEMORY_COLLECTION_NAME:-ramone_sessions}
      - MEMORY_MAX_TURNS=${MEMORY_MAX_TURNS:-20}
      - MEMORY_CONTEXT_TURNS=${MEMORY_CONTEXT_TURNS:-6}
      - MEMORY_TTL_SECONDS=${MEMORY_TTL_SECONDS:-259200}
      - MEMORY_MAX_MESSAGE_CHARS=${MEMORY_MAX_MESSAGE_CHARS:-4000}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - NOTIFY_URL=${NOTIFY_URL:-}
      - NOTIFY_TOKEN=${NOTIFY_TOKEN:-}
      - NOTIFY_ON_START=${NOTIFY_ON_START:-false}
      # New: shared secret enforced by app/auth.py middleware. Required
      # whenever the service is exposed through a Cloudflare Tunnel; the
      # app refuses to start if this is empty (fail-closed).
      - ATLAS_SECRET=${ATLAS_SECRET:?ATLAS_SECRET must be set; generate with `python -c "import secrets; print(secrets.token_urlsafe(48))"`}
    volumes:
      # Read-only: ingest consumes documents, it must never be able to
      # touch the originals.
      - ./docs:/srv/docs:ro
    extra_hosts:
      # Docker Desktop provides host.docker.internal natively; native
      # Linux does not. host-gateway makes the name resolve everywhere,
      # which is what keeps OLLAMA_HOST's default cross-platform.
      - "host.docker.internal:host-gateway"
    healthcheck:
      # /health returns 503 while degraded. The check sends the shared
      # secret so the auth middleware does not turn the healthcheck into
      # a 401 storm.
      test:
        [
          "CMD",
          "python",
          "-c",
          "import os,urllib.request as r; req=r.Request('http://localhost:8000/health', headers={'x-atlas-secret': os.environ['ATLAS_SECRET']}); r.urlopen(req, timeout=4)",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      # Startup ingest plus model warm-up can legitimately take a while;
      # do not mark the container unhealthy during that window.
      start_period: 60s

volumes:
  chroma-data:
